name: Fetch TaiPower Data

on:
  schedule:
    - cron: '*/10 * * * *'   # 每 10 分鐘（配合台電更新頻率）
  workflow_dispatch:           # 手動觸發（測試用）

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests cloudscraper

      - name: Fetch TaiPower data
        run: python scripts/fetch_data.py

      - name: Commit & push data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "chore: update power data"
          git push
